{% set name = "nglview" %}
{% set version = "4.0.1" %}
{% set python_min = "3.11" %}
{% set sha256 = "1e15b819b9f8ada3e521e587d24cc3754573203cc99ee5d801cef28d992865a5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 1
  noarch: python
  script: python -m pip install . --no-deps --ignore-installed

requirements:
  build:
    - nodejs
  host:
    - python {{ python_min }}
    - pip
    - numpy
    - jupyter-packaging
    - setuptools_scm
    - notebook >=7
    - ipywidgets >=8
  run:
    - python >={{ python_min }}
    - numpy
    - ipywidgets >=8
    - notebook >=7
    - jupyterlab_widgets

test:
  requires:
    - python {{ python_min }}
    - jupyterlab
    - notebook
    - pip
    - numpy
  imports:
    - nglview
  commands:
    - jupyter labextension list 2>&1 | grep -ie "nglview-js-widgets.*OK"
    - pip check

about:
  home: http://github.com/arose/nglview
  license: MIT
  license_file: LICENSE
  summary: An IPython widget to interactively view molecular structures and trajectories. Utilizes the embeddable NGL Viewer for rendering.
  doc_url: https://arose.github.io/nglview/latest/
  dev_url: https://github.com/arose/nglview

extra:
  recipe-maintainers:
    - marscher
    - gph82
    - hainm
